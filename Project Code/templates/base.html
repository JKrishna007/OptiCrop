<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OptiCrop — AI-powered Smart Agricultural Production Optimization Engine. Get intelligent crop recommendations based on soil and environmental data." />
    <title>{% block title %}OptiCrop — Smart Crop Recommendation{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

    <!-- ─── Navbar ──────────────────────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar" id="main-navbar">
        <div class="container">
            <a class="navbar-brand brand-text" href="/">
                <span class="brand-icon">🌾</span> OptiCrop
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" id="nav-home">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about" id="nav-about">
                            <i class="bi bi-info-circle"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com" target="_blank" id="nav-github">
                            <i class="bi bi-github"></i> GitHub
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ─── Main Content ────────────────────────────────────────────────── -->
    <main class="main-content">
        {% if error_code %}
        <div class="container text-center py-5 mt-5">
            <h1 class="display-1 fw-bold text-accent">{{ error_code }}</h1>
            <p class="lead">{{ error_msg }}</p>
            <a href="/" class="btn btn-accent mt-3">Go Home</a>
        </div>
        {% else %}
            {% block content %}{% endblock %}
        {% endif %}
    </main>

    <!-- ─── Footer ──────────────────────────────────────────────────────── -->
    <footer class="site-footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <span class="brand-icon">🌾</span>
                    <span class="fw-semibold">OptiCrop</span>
                    <span class="text-muted ms-2">— Smart Agricultural Optimization</span>
                </div>
                <div class="col-md-6 text-center text-md-end mt-2 mt-md-0">
                    <small class="text-muted">© 2026 OptiCrop. Built with Flask & Scikit-learn.</small>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
